# ---------- ELEMENT reusability (NUEVO 2026-05-31) ----------
# Sólo aplica cuando se lint-ea con element_role ∈ {character, prop}: las
# imágenes Génesis de personajes y props son ANCLAS reutilizables, así que su
# prompt debe (A) declarar un fondo neutro blanco o gris claro y (B) NO contener
# información de una escena específica (deben ser generales para adaptarse a
# distintas escenas). Ambas listas son editables sin tocar código; las
# violaciones son override-ables con `OVERRIDE: <término|ELEMENT> - <razón>`.

# (A) Al menos uno de estos términos debe estar PRESENTE en el MAIN.
NEUTRAL_BACKGROUND_TERMS:
