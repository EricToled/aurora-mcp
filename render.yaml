# AURORA remote MCP server — Render blueprint.
#
# What this does: hosts AURORA's deterministic gate code on the internet so
# it can be registered as a custom connector in your Claude account and used
# from ANY session (Cowork or regular Claude). The code runs server-side, so
# the gate behaves identically every time — that's the determinism you need.
#
# Deploy: push this repo to GitHub, then in Render -> New -> Blueprint, pick
# the repo. Render reads this file and builds the Dockerfile automatically.
# After deploy, your MCP URL is:  https://<service-name>.onrender.com/mcp
#
# STATE PERSISTENCE (free tier): Render's free filesystem is ephemeral, so the
# canonical store lives in TURSO (a hosted, SQLite-compatible libSQL database,
# free tier). Set these two secrets in the Render dashboard (Environment) and
# AURORA persists projects / decision sheets / dossiers / bypass history across
# redeploys and cold-starts. With them unset, AURORA falls back to a local
# (ephemeral) SQLite file — same as before.
#
#   AURORA_TURSO_DATABASE_URL = libsql://<your-db>.turso.io
#   AURORA_TURSO_AUTH_TOKEN   = <turso db tokens create ...>
services:
  - type: web
    name: aurora-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: AURORA_HTTP
        value: "1"
      # Hosted libSQL (Turso) — set in the dashboard, not stored in the blueprint.
      - key: AURORA_TURSO_DATABASE_URL
        sync: false
      - key: AURORA_TURSO_AUTH_TOKEN
        sync: false
      # Local fallback path used only when Turso is NOT configured (ephemeral).
      - key: AURORA_DB_PATH
        value: /app/aurora.db
