# AURORA remote MCP server — Render blueprint.
#
# What this does: hosts AURORA's deterministic gate code on the internet so
# it can be registered as a custom connector in your Claude account and used
# from ANY session (Cowork or regular Claude). The code runs server-side, so
# the gate behaves identically every time — that's the determinism you need.
#
# Deploy: push this repo to GitHub, then in Render -> New -> Blueprint, pick
# the repo. Render reads this file and builds the Dockerfile automatically.
# After deploy, your MCP URL is:  https://<service-name>.onrender.com/mcp
#
# STATE PERSISTENCE: a persistent disk is mounted at /data and the SQLite DB
# lives at /data/aurora.db, so projects / decision sheets / dossiers / bypass
# history SURVIVE redeploys and cold-starts. Persistent disks require a paid
# instance, so the plan is "starter" (not free). NOTE: a service with a disk
# runs as a single instance and uses recreate (brief downtime) deploys — fine
# for AURORA.
services:
  - type: web
    name: aurora-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    disk:
      name: aurora-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: AURORA_HTTP
        value: "1"
      # Persistent: lives on the mounted disk, retained across redeploys/sleep.
      - key: AURORA_DB_PATH
        value: /data/aurora.db
