<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURORA Academy — Videos Publicitarios con Google Flow &amp; Kling</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #14141c;
    --panel2: #1c1c28;
    --line: #2a2a3a;
    --text: #e8e8f0;
    --muted: #8a8aa0;
    --accent: #6ee7ff;
    --accent2: #a78bfa;
    --ok: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --mono: ui-monospace, "Cascadia Code", "Consolas", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    line-height: 1.6;
  }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #16161f, #0a0a0f);
    position: sticky; top: 0; z-index: 20;
  }
  header h1 {
    margin: 0; font-size: 20px; letter-spacing: 3px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .progressbar { height: 6px; background: var(--panel2); border-radius: 999px; overflow: hidden; margin-top: 12px; }
  .progressbar > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }
  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; max-width: 1280px; margin: 0 auto; }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } aside { position: static !important; height: auto !important; } }
  aside {
    border-right: 1px solid var(--line); padding: 20px 14px;
    position: sticky; top: 89px; height: calc(100vh - 89px); overflow-y: auto;
  }
  .nav-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 8px 10px; font-weight: 700; }
  .navitem {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: var(--muted); transition: all .15s; margin-bottom: 2px;
  }
  .navitem:hover { background: var(--panel); color: var(--text); }
  .navitem.active { background: var(--panel2); color: var(--text); }
  .navitem.locked { opacity: .45; cursor: not-allowed; }
  .navitem .ic { width: 26px; height: 26px; border-radius: 7px; background: var(--panel2); display: grid; place-items: center; font-size: 13px; flex: none; }
  .navitem.active .ic { background: var(--accent); color: #04141a; }
  .navitem .st { margin-left: auto; font-size: 13px; }
  main { padding: 28px 32px 100px; min-height: 60vh; }
  .wrap { max-width: 820px; }
  .crumb { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  h2.stage { margin: 0 0 4px; font-size: 24px; }
  .lead { color: var(--muted); font-size: 15px; margin: 0 0 22px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 22px 24px; margin-bottom: 18px;
  }
  .card h3 { margin: 0 0 10px; font-size: 16px; color: var(--text); }
  .card h3 .tag { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .card p { margin: 0 0 12px; font-size: 14.5px; }
  .card ul, .card ol { margin: 0 0 12px; padding-left: 20px; font-size: 14.5px; }
  .card li { margin-bottom: 7px; }
  .objectives { list-style: none; padding: 0; margin: 0; }
  .objectives li { display: flex; gap: 10px; padding: 6px 0; font-size: 14px; }
  .objectives li::before { content: "→"; color: var(--accent); font-weight: 700; }
  b, strong { color: #fff; }
  code { background: var(--panel2); padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 12.5px; color: var(--accent); }
  .ui { background: #20202c; color: #cfe9ff; padding: 1px 7px; border-radius: 4px; font-weight: 600; font-size: 12.5px; white-space: nowrap; }
  .kv { background: #05050a; border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; font-family: var(--mono); font-size: 12.5px; white-space: pre-wrap; color: #cfe9ff; margin: 0 0 12px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.ok { background: rgba(74,222,128,.15); color: var(--ok); }
  .pill.warn { background: rgba(251,191,36,.15); color: var(--warn); }
  .pill.bad { background: rgba(248,113,113,.15); color: var(--bad); }
  .pill.muted { background: rgba(138,138,160,.15); color: var(--muted); }
  .pill.flow { background: rgba(110,231,255,.13); color: var(--accent); }
  .pill.kling { background: rgba(167,139,250,.16); color: var(--accent2); }
  .note { border-left: 3px solid var(--warn); background: rgba(251,191,36,.06); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 13.5px; margin: 0 0 12px; color: #f4e4b8; }
  .note.acc { border-color: var(--accent); background: rgba(110,231,255,.06); color: #bfeeff; }
  .note.kl { border-color: var(--accent2); background: rgba(167,139,250,.07); color: #e0d4ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; margin: 4px 0 14px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--muted); font-weight: 700; font-size: 11px; text-transform: uppercase; }
  ol.steps { counter-reset: step; list-style: none; padding-left: 0; }
  ol.steps > li {
    counter-increment: step; position: relative; padding: 4px 0 12px 38px; margin: 0; border-left: 1px solid var(--line); margin-left: 12px;
  }
  ol.steps > li:last-child { border-left: 1px solid transparent; }
  ol.steps > li::before {
    content: counter(step); position: absolute; left: -12px; top: 0; width: 24px; height: 24px;
    background: var(--accent); color: #04141a; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 800;
  }
  ol.steps.kl > li::before { background: var(--accent2); color: #1a0b3a; }
  .srcs { list-style: none; padding: 0; margin: 0; }
  .srcs li { padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; display: flex; gap: 8px; }
  .srcs li:last-child { border-bottom: none; }
  .srcs a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .srcs a:hover { text-decoration: underline; }
  .srcs .badge { font-size: 10px; font-weight: 800; letter-spacing: .5px; padding: 1px 7px; border-radius: 4px; flex: none; height: 18px; margin-top: 2px; }
  .badge.off { background: rgba(74,222,128,.15); color: var(--ok); }
  .badge.tut { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge.mcp { background: rgba(167,139,250,.16); color: var(--accent2); }
  /* Quiz */
  .q { margin-bottom: 18px; }
  .q .qtext { font-weight: 600; font-size: 14.5px; margin-bottom: 10px; }
  .opt {
    display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; margin-bottom: 7px; cursor: pointer; font-size: 14px; background: var(--panel2); transition: all .12s;
  }
  .opt:hover { border-color: #3a3a4f; }
  .opt.sel { border-color: var(--accent); background: rgba(110,231,255,.08); }
  .opt.correct { border-color: var(--ok); background: rgba(74,222,128,.1); }
  .opt.wrong { border-color: var(--bad); background: rgba(248,113,113,.1); }
  .opt .mk { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--muted); flex: none; margin-top: 1px; }
  .opt.sel .mk { border-color: var(--accent); background: var(--accent); }
  .explain { font-size: 13px; color: var(--muted); margin: 4px 0 0 30px; display: none; }
  .explain.show { display: block; }
  .explain.good { color: var(--ok); }
  .explain.bad { color: #ffb4b4; }
  /* Deliverable */
  label.fld { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; font-weight: 600; }
  textarea, input[type=text] {
    width: 100%; background: var(--panel2); border: 1px solid var(--line);
    color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .checkrow { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; font-size: 14px; cursor: pointer; }
  .checkrow input { margin-top: 3px; }
  button.act {
    margin-top: 8px; padding: 11px 22px; background: var(--accent); color: #04141a;
    border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px;
  }
  button.act:hover { filter: brightness(1.1); }
  button.act:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  button.ghost:hover { background: rgba(110,231,255,.08); }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 14px; }
  .result { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; }
  .result.show { display: block; }
  .result.pass { background: rgba(74,222,128,.12); color: var(--ok); border: 1px solid rgba(74,222,128,.3); }
  .result.fail { background: rgba(248,113,113,.12); color: #ffb4b4; border: 1px solid rgba(248,113,113,.3); }
  .saved { font-size: 12.5px; color: var(--ok); margin-left: 4px; display: none; }
  .saved.show { display: inline; }
  .stagefoot { display: flex; justify-content: space-between; gap: 12px; margin-top: 26px; flex-wrap: wrap; }
  .locknote { text-align: center; padding: 50px 20px; color: var(--muted); }
  .locknote .big { font-size: 40px; margin-bottom: 10px; }
  .toolbar { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .toolbar button { font-size: 12px; padding: 7px 12px; }
  .badge-final { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #04141a; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; }
</style>
</head>
<body>
<header>
  <h1>AURORA ACADEMY</h1>
  <p>Tutorial interactivo — <b style="color:#cfe9ff">videos publicitarios</b> con <span class="pill flow">Google Flow / Veo</span> &amp; <span class="pill kling">Kling</span> · anclado en interfaces y tutoriales reales · evaluación + entregables por etapa</p>
  <div class="progressbar"><div id="globalbar"></div></div>
</header>

<div class="layout">
  <aside>
    <div class="nav-title">Ruta de aprendizaje</div>
    <div id="nav"></div>
    <div class="nav-title" style="margin-top:18px">Progreso</div>
    <div class="toolbar">
      <button class="ghost" onclick="exportProgress()">Exportar avance</button>
      <button class="ghost" onclick="resetAll()">Reiniciar</button>
    </div>
  </aside>

  <main>
    <div class="wrap" id="content"></div>
  </main>
</div>

<script>
/* ============================================================
   AURORA ACADEMY — datos del curso
   Contenido anclado en fuentes verificadas (jun 2026):
   · Help oficial de Google Flow (support.google.com/flow)
   · Guía oficial de cámara y user guide de Kling (kling.ai / app.klingai.com)
   · Guía de prompting de Veo (DeepMind / Google Cloud)
   · Introspección de modelos vía conector Higgsfield (kling3_0, veo3)
   Metodología AURORA: preproducción disciplinada, génesis de assets,
   anchors/continuidad, biomecánica, prompt research-driven y
   "no inventar capabilities" (verifica versión en plataforma).
   ============================================================ */
const PASS = 0.70; // umbral de aprobación de cada evaluación

const STAGES = [
/* 0 */ {
  icon:"◎", title:"Cómo funciona este curso",
  lead:"Lee, aprueba la evaluación y entrega el trabajo de cada etapa. Cada etapa se desbloquea al aprobar la anterior.",
  objectives:[
    "Entender el ciclo: Leer → Evaluación → Entregable.",
    "Saber qué desbloquea cada etapa y dónde se guarda tu avance.",
    "Adoptar la disciplina AURORA: nada de improvisar prompts ni inventar funciones."
  ],
  lessons:[
    {h:"El ciclo de cada etapa", body:`
      <p>Cada etapa tiene estos bloques en orden:</p>
      <ol>
        <li><b>Lección</b> — contenido anclado en la interfaz real de cada plataforma.</li>
        <li><b>Tutoriales y fuentes reales</b> — enlaces oficiales y guías para que verifiques y amplíes.</li>
        <li><b>Evaluación</b> — preguntas con calificación. Necesitas <b>${Math.round(PASS*100)}%</b> para aprobar.</li>
        <li><b>Entregable</b> — un artefacto real que produces y se guarda en tu navegador.</li>
      </ol>
      <p>La <b>siguiente etapa se desbloquea</b> al aprobar la evaluación. Una etapa queda <span class="pill ok">✓ Completa</span> cuando apruebas <b>y</b> guardas el entregable.</p>`},
    {h:"Por qué este curso cita fuentes", body:`
      <p>AURORA es <b>research-driven</b>: no inventa capacidades de las plataformas. Cada etapa de Flow/Kling trae una sección <b>Fuentes reales</b> con tres tipos de referencia:</p>
      <ul>
        <li><span class="pill ok">OFICIAL</span> documentación de Google / Kling.</li>
        <li><span class="pill warn">TUTORIAL</span> guías de la comunidad (paso a paso).</li>
        <li><span class="pill kling">CONECTOR</span> introspección de modelos (parámetros reales confirmados vía MCP).</li>
      </ul>
      <div class="note">Las interfaces de IA cambian rápido. Si un botón no coincide exactamente con lo descrito, abre la fuente OFICIAL de esa etapa: es la verdad viva. El método no cambia; los nombres de botones sí.</div>`},
    {h:"La regla de oro AURORA", body:`
      <ul>
        <li><b>No generes video sin preproducción validada.</b></li>
        <li><b>No inventes capabilities</b>: si dudas, verifica en la plataforma o en las fuentes.</li>
        <li><b>Cambia una sola variable por iteración</b> (modelo, anchor, prompt, biomecánica…), nunca varias a la vez.</li>
      </ul>
      <p>Tu avance vive en <code>localStorage</code> de este navegador (sin servidor, sin internet salvo para abrir los enlaces). Usa <b>Exportar avance</b> para llevarte tus entregables.</p>`}
  ],
  sources:[
    {b:"off", t:"Google Flow — Centro de ayuda oficial", u:"https://support.google.com/flow/"},
    {b:"off", t:"Kling AI — User Guide oficial (app.klingai.com)", u:"https://app.klingai.com/global/quickstart/klingai-video-o1-user-guide"}
  ],
  quiz:[
    {q:"¿Qué necesitas para desbloquear la siguiente etapa?", o:["Solo leer","Aprobar la evaluación de la etapa actual","Pagar","Estar online"], a:1, e:"La siguiente etapa se abre al aprobar la evaluación (≥70%)."},
    {q:"Si un botón de la app no coincide con lo descrito en el curso, ¿qué haces?", o:["Inventas el paso","Abres la fuente OFICIAL de la etapa y verificas","Te rindes","Usas otra app"], a:1, e:"No inventar capabilities: la fuente oficial es la verdad viva."},
    {q:"¿Cuándo una etapa queda “✓ Completa”?", o:["Al abrirla","Al aprobar la evaluación y guardar el entregable","Al ver un video","Nunca"], a:1, e:"Completa = evaluación aprobada + entregable guardado."}
  ],
  deliverable:{
    title:"Tu contrato de aprendizaje",
    instructions:"Define qué quieres lograr. Esto orienta el proyecto final.",
    fields:[
      {id:"goal", type:"textarea", label:"¿Qué tipo de video publicitario quieres saber producir? (ej: spot de producto 15s, UGC para redes, hero ad cinemático)"},
      {id:"brand", type:"text", label:"Marca / producto con el que practicarás durante el curso"},
      {id:"access", type:"text", label:"¿Tienes ya cuenta en Flow (Google AI Pro/Ultra) y en Kling? (sí/no/cuál)"},
      {id:"commit", type:"check", label:"Me comprometo a verificar en las fuentes, no improvisar la preproducción y cambiar una variable por iteración."}
    ]
  }
},
/* 1 */ {
  icon:"1", title:"Cómo piensa un video publicitario AI",
  lead:"Antes de tocar Flow o Kling: qué hace que un anuncio funcione y por qué la IA exige más estructura, no menos.",
  objectives:[
    "Distinguir un brief publicitario de un prompt.",
    "Reconocer los tipos de output (hero ad, UGC, demo, social vertical…).",
    "Entender por qué el video AI se planea por shots cortos encadenados."
  ],
  lessons:[
    {h:"Anuncio ≠ clip bonito", body:`
      <p>Un anuncio tiene un <b>trabajo</b>: mover a una persona de un estado emocional a una acción. Esqueleto mínimo de un spot corto:</p>
      <ul>
        <li><b>Hook (0–3s)</b> — detiene el scroll: tensión, sorpresa o promesa.</li>
        <li><b>Desarrollo</b> — el beneficio o transformación, mostrado, no narrado.</li>
        <li><b>Producto / marca</b> — entra como héroe, no como pegote.</li>
        <li><b>Final frame + CTA</b> — el cuadro que se recuerda y la acción que esperas.</li>
      </ul>`},
    {h:"Tipos de output", body:`
      <table>
        <tr><th>Tipo</th><th>Carácter</th><th>Buen fit</th></tr>
        <tr><td>hero_ad</td><td>Cinemático, aspiracional</td><td>Lanzamientos, branding</td></tr>
        <tr><td>ugc</td><td>Crudo, "persona real", cámara en mano</td><td>Redes, performance</td></tr>
        <tr><td>product_demo</td><td>Claro, muestra función</td><td>E-commerce</td></tr>
        <tr><td>cinematic_ad</td><td>Narrativo, atmósfera</td><td>Historias de marca</td></tr>
        <tr><td>social_vertical</td><td>9:16, rápido, primer segundo decisivo</td><td>Reels / Shorts / TikTok</td></tr>
      </table>`},
    {h:"Por qué se planea por shots", body:`
      <p>Los modelos generan <b>tomas cortas</b>. Dato real verificado en este curso: en el conector, <span class="pill kling">Kling 3.0</span> declara duración <code>3–15s</code> por generación, y <span class="pill flow">Veo</span> entrega clips cortos que luego se extienden. Un anuncio de 15–30s es la <b>suma de varios shots</b> encadenados con continuidad.</p>
      <p>De ahí dos pipelines que NO se mezclan:</p>
      <ul>
        <li><b>Pipeline de imagen (génesis):</b> crear assets reutilizables — personaje, producto, locación.</li>
        <li><b>Pipeline de video (producción):</b> animar esos assets shot por shot con anchors.</li>
      </ul>`}
  ],
  sources:[
    {b:"mcp", t:"Conector Higgsfield — kling3_0: duration 3–15s, modos std/pro/4k (introspección)", u:""},
    {b:"tut", t:"How Google Flow & Veo 3 rebuild the AI filmmaking workflow (Oreate AI)", u:"https://discover.oreateai.com/discover/how-google-flow-and-veo-3-rebuild-the-ai-filmmaking-workflow"}
  ],
  quiz:[
    {q:"¿Cuál es el trabajo de un anuncio?", o:["Verse caro","Mover a una persona hacia una acción","Lucir la IA","Durar lo máximo"], a:1, e:"El anuncio existe para provocar una acción."},
    {q:"En social_vertical lo más decisivo es…", o:["El último frame","Los créditos","El primer segundo / hook","La duración"], a:2, e:"El scroll se gana o pierde en el primer segundo."},
    {q:"¿Por qué se planea por shots?", o:["Capricho","Porque los modelos generan tomas cortas (p. ej. Kling 3–15s) que se encadenan","Porque es gratis","Porque la IA no entiende color"], a:1, e:"Cada generación es una toma corta; el anuncio las suma con continuidad."},
    {q:"¿Qué NO debes mezclar?", o:["Hook y CTA","Pipeline de imagen (génesis) con pipeline de video (producción)","Audio y video","Marca y producto"], a:1, e:"Génesis de assets y producción de video son pipelines separados."}
  ],
  deliverable:{
    title:"Brief de una línea + tipo de output",
    instructions:"Define el norte creativo de tu spot de práctica.",
    fields:[
      {id:"oneliner", type:"textarea", label:"Brief de una línea: ¿qué siente y qué hace el espectador al terminar?"},
      {id:"output", type:"text", label:"Tipo de output (hero_ad / ugc / product_demo / cinematic_ad / social_vertical)"},
      {id:"hook", type:"textarea", label:"Idea de hook para los primeros 3 segundos"}
    ]
  }
},
/* 2 */ {
  icon:"2", title:"Preproducción: el Preproduction Packet",
  lead:"El gate más importante de AURORA. Sin un packet completo, no se produce video. Aquí lo construyes.",
  objectives:[
    "Conocer los campos obligatorios del brief de video de AURORA.",
    "Escribir un final_frame_description y un emotional_beat útiles.",
    "Definir success_criteria medibles."
  ],
  lessons:[
    {h:"Qué valida el gate", body:`
      <p>AURORA bloquea la producción si falta cualquier campo. Obligatorios (de <code>video_brief.yaml</code> del repo):</p>
      <div class="kv">operator_intent        # qué quieres, en tus palabras
output_type            # hero_ad | ugc | product_demo | cinematic_ad | social_vertical | ...
duration_seconds       # entero > 0
emotional_beat         # la emoción núcleo
product_or_brand       # qué se anuncia
core_action            # la acción central en pantalla
target_audience        # a quién le hablas
final_frame_description# el cuadro que queda grabado
audio_strategy         # native_ai | external_track | silent | mixed
success_criteria[]     # >= 1 criterio medible</div>`},
    {h:"emotional_beat y final_frame", body:`
      <p><b>emotional_beat</b> es una emoción concreta: <i>alivio</i>, <i>orgullo</i>, <i>urgencia</i>, <i>pertenencia</i>. <b>final_frame_description</b> es el cuadro que el espectador recuerda — descríbelo como una foto (sujeto, producto, composición, luz, texto en pantalla).</p>
      <div class="note">Tip operativo: en Kling, el final_frame se convierte literalmente en tu <b>end frame</b> (etapa 6). Escribirlo bien aquí te ahorra trabajo después.</div>`},
    {h:"success_criteria medibles", body:`
      <ul>

      <div class="kv">[SUJETO]   quién/qué (referenciado a tu génesis / ingredient / start frame)

[CÁMARA]   lente, ángulo, movimiento
[LUZ/ESTILO]  temperatura, mood, look
[AUDIO]    diálogo/SFX/ambiente (clave en Veo)
[NEGATIVE] lo que NO quieres (morphing, manos extra, texto, logos)</div>
      <p><b>Anti-redundancia:</b> si una referencia ya carga una categoría (pose, outfit, locación, prop, estilo), <b>no la re-describas</b> en el cuerpo. El contexto de movimiento sí va; es acción, no descriptor estático.</p>`},
    {h:"Veo (Flow): descriptivo + audio nativo", body:`
      <p>Guía oficial de Veo: di <b>quién habla, qué dice, cómo lo dice, qué suena alrededor</b>. Fórmula real para diálogo: <i>descripción del personaje + acción + diálogo entre comillas</i>, con modificadores de tono.</p>
      <div class="kv">A young barista, smiling, slides the cup forward and
says warmly: "Tu momento empieza aquí."
SFX: crisp espresso machine hiss as she turns the cup.
Ambient: low café murmur (background), soft jazz (faint).
Negative: distorted hands, text overlay, watermark.</div>
      <ul>
        <li>Diálogo <b>corto</b> (≈ &lt; 8s / una línea) para evitar desincronía.</li>
        <li>Liga SFX a la acción con <b>"as" / "when"</b>.</li>
        <li>Ambiente por capas: foreground / midground / background.</li>
      </ul>`},
    {h:"Kling: movimiento + frames + sliders", body:`
      <p>En <span class="pill kling">Kling</span> el prompt apoya al control visual: <b>start/end frame</b> y movimiento. El panel real incluye:</p>
      <ul>
        <li><b>Negative prompt</b> — campo dedicado.</li>

        <li><b>Camera Movement</b> — vocabulario fijo (etapa 6).</li>

    {h:"El negative no es opcional", body:`
      <p>Mínimos para anuncios: <code>morphing</code>, <code>deformed hands</code>, <code>extra limbs</code>, <code>flicker</code>, <code>text</code>, <code>logos</code>, <code>watermark</code>, y todo lo que altere tu producto. Kling tiene <b>campo negative</b> propio; en Veo se incluye como instrucción negativa en el prompt.</p>`}

        <li><b>Duración</b>: típicamente <b>5s o 10s</b> por clip (el conector reporta 3–15s según versión).</li>

/* ============================================================
   Estado / persistencia
   ============================================================ */
const LS_KEY = "aurora_academy_v2";
let state = load();
let current = state.current || 0;

function load(){
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {stages:{}, current:0}; }
  catch(e){ return {stages:{}, current:0}; }
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function st(i){ if(!state.stages[i]) state.stages[i] = {quizBest:0, quizPassed:false, answers:{}, deliv:{}, delivSaved:false}; return state.stages[i]; }

function isUnlocked(i){ if(i===0) return true; return !!st(i-1).quizPassed; }
function isComplete(i){ const s=st(i); return s.quizPassed && s.delivSaved; }

/* ============================================================
   Render
   ============================================================ */
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  STAGES.forEach((s,i)=>{
    const unlocked = isUnlocked(i);
    const div = document.createElement("div");
    div.className = "navitem" + (i===current?" active":"") + (unlocked?"":" locked");
    let stat = "";
    if(!unlocked) stat = "🔒";
    else if(isComplete(i)) stat = '<span class="pill ok">✓</span>';
    else if(st(i).quizPassed) stat = '<span class="pill warn">◐</span>';
    div.innerHTML = `<span class="ic">${s.icon}</span><span style="flex:1">${s.title}</span><span class="st">${stat}</span>`;
    if(unlocked) div.onclick = ()=>{ current=i; state.current=i; save(); render(); window.scrollTo(0,0); };
    nav.appendChild(div);
  });
  const done = STAGES.filter((_,i)=>isComplete(i)).length;
  document.getElementById("globalbar").style.width = Math.round(done/STAGES.length*100)+"%";
}

const BADGE_LABEL = {off:"OFICIAL", tut:"TUTORIAL", mcp:"CONECTOR"};

function render(){
  renderNav();
  const s = STAGES[current];
  const c = document.getElementById("content");
  if(!isUnlocked(current)){
    c.innerHTML = `<div class="locknote"><div class="big">🔒</div><p>Esta etapa está bloqueada.<br>Aprueba la evaluación de la etapa anterior para desbloquearla.</p></div>`;
    return;
  }
  const sObj = st(current);
  let html = `<div class="crumb">Etapa ${current} de ${STAGES.length-1} ${s.final?'· <span class="badge-final">PROYECTO FINAL</span>':''}</div>`;
  html += `<h2 class="stage">${s.icon==='★'?'★ ':''}${s.title}</h2>`;
  html += `<p class="lead">${s.lead}</p>`;

  html += `<div class="card"><h3><span class="tag">OBJETIVOS</span></h3><ul class="objectives">`;
  s.objectives.forEach(o=> html += `<li>${o}</li>`);
  html += `</ul></div>`;

  s.lessons.forEach(l=>{ html += `<div class="card"><h3>${l.h}</h3>${l.body}</div>`; });

  // sources
  if(s.sources && s.sources.length){
    html += `<div class="card"><h3><span class="tag">FUENTES Y TUTORIALES REALES</span></h3><ul class="srcs">`;
    s.sources.forEach(src=>{
      const lbl = BADGE_LABEL[src.b] || "FUENTE";
      const link = src.u ? `<a href="${src.u}" target="_blank" rel="noopener">${src.t}</a>` : `<span>${src.t}</span>`;
      html += `<li><span class="badge ${src.b}">${lbl}</span>${link}</li>`;
    });
    html += `</ul></div>`;
  }

  // quiz
  html += `<div class="card" id="quizcard"><h3><span class="tag">EVALUACIÓN</span> — necesitas ${Math.round(PASS*100)}% para aprobar</h3>`;
  s.quiz.forEach((q,qi)=>{
    html += `<div class="q" data-qi="${qi}"><div class="qtext">${qi+1}. ${q.q}</div>`;
    q.o.forEach((opt,oi)=>{
      const sel = sObj.answers[qi]===oi ? " sel":"";
      html += `<div class="opt${sel}" data-qi="${qi}" data-oi="${oi}" onclick="pick(${qi},${oi})"><span class="mk"></span><span>${opt}</span></div>`;
    });
    html += `<div class="explain" id="exp-${qi}"></div></div>`;
  });
  html += `<div class="btnrow"><button class="act" onclick="grade()">Calificar evaluación</button>
           <span style="font-size:13px;color:var(--muted)">Mejor puntaje: <b id="bestscore">${Math.round(sObj.quizBest*100)}%</b></span></div>`;
  html += `<div class="result ${sObj.quizPassed?'pass show':''}" id="quizresult">${sObj.quizPassed?'✓ Evaluación aprobada. Etapa siguiente desbloqueada.':''}</div>`;
  html += `</div>`;

  // deliverable
  const dlocked = !sObj.quizPassed;
  html += `<div class="card"><h3><span class="tag">ENTREGABLE</span> — ${s.deliverable.title} ${isComplete(current)?'<span class="pill ok">guardado</span>':''}</h3>`;
  html += `<p style="font-size:14px;color:var(--muted)">${s.deliverable.instructions}</p>`;
  if(dlocked){ html += `<div class="note">Aprueba la evaluación para habilitar el entregable.</div>`; }
  s.deliverable.fields.forEach(f=>{
    const val = sObj.deliv[f.id] || "";
    if(f.type==="check"){
      const ck = val===true || val==="true" ? "checked":"";
      html += `<label class="checkrow"><input type="checkbox" id="d-${f.id}" ${ck} ${dlocked?'disabled':''}><span>${f.label}</span></label>`;
    } else if(f.type==="textarea"){
      html += `<label class="fld">${f.label}</label><textarea id="d-${f.id}" ${dlocked?'disabled':''}>${escapeHtml(val)}</textarea>`;
    } else {
      html += `<label class="fld">${f.label}</label><input type="text" id="d-${f.id}" value="${escapeHtml(val)}" ${dlocked?'disabled':''}>`;
    }
  });
  html += `<div class="btnrow"><button class="act" onclick="saveDeliv()" ${dlocked?'disabled':''}>Guardar entregable</button>
           <span class="saved ${sObj.delivSaved?'show':''}" id="delivsaved">✓ Guardado en este navegador</span></div></div>`;

  // footer
  html += `<div class="stagefoot">`;
  if(current>0) html += `<button class="ghost" onclick="go(${current-1})">← Anterior</button>`; else html += `<span></span>`;
  if(current<STAGES.length-1){
    const nextLocked = !sObj.quizPassed;
    html += `<button class="act" onclick="go(${current+1})" ${nextLocked?'disabled':''}>${nextLocked?'Aprueba la evaluación para continuar':'Siguiente etapa →'}</button>`;
  } else {
    html += `<span style="font-size:13px;color:var(--muted)">${isComplete(current)?'🎓 ¡Curso completado! Exporta tu avance como portafolio.':'Completa el proyecto final para terminar.'}</span>`;
  }
  html += `</div>`;

  c.innerHTML = html;
}

function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ============================================================
   Interacción
   ============================================================ */
function pick(qi, oi){
  const s = st(current);
  s.answers[qi] = oi;
  save();
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(el=>{
    el.classList.toggle("sel", parseInt(el.dataset.oi)===oi);
  });
}

function grade(){
  const s = STAGES[current];
  const sObj = st(current);
  let correct = 0;
  s.quiz.forEach((q,qi)=>{
    const ans = sObj.answers[qi];
    const exp = document.getElementById("exp-"+qi);
    document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(el=>{
      const oi = parseInt(el.dataset.oi);
      el.classList.remove("correct","wrong");
      if(oi===q.a) el.classList.add("correct");
      else if(oi===ans) el.classList.add("wrong");
    });
    if(ans===q.a){ correct++; exp.className="explain show good"; exp.textContent="✓ Correcto. "+q.e; }
    else { exp.className="explain show bad"; exp.textContent=(ans===undefined?"Sin responder. ":"✗ ")+q.e; }
  });
  const score = correct / s.quiz.length;
  sObj.quizBest = Math.max(sObj.quizBest, score);
  const passed = score >= PASS;
  if(passed) sObj.quizPassed = true;
  save();
  document.getElementById("bestscore").textContent = Math.round(sObj.quizBest*100)+"%";
  const res = document.getElementById("quizresult");
  res.className = "result show " + (passed?"pass":"fail");
  res.textContent = passed
    ? `✓ ${correct}/${s.quiz.length} (${Math.round(score*100)}%). Aprobado. Entregable y siguiente etapa desbloqueados.`
    : `✗ ${correct}/${s.quiz.length} (${Math.round(score*100)}%). Necesitas ${Math.round(PASS*100)}%. Revisa las explicaciones y reintenta.`;
  renderNav();
  if(passed){ setTimeout(render, 900); }
}

function saveDeliv(){
  const s = STAGES[current];
  const sObj = st(current);
  s.deliverable.fields.forEach(f=>{
    const el = document.getElementById("d-"+f.id);
    if(!el) return;
    sObj.deliv[f.id] = f.type==="check" ? el.checked : el.value;
  });
  sObj.delivSaved = true;
  save();
  document.getElementById("delivsaved").classList.add("show");
  renderNav();
}

function go(i){ if(!isUnlocked(i)) return; current=i; state.current=i; save(); render(); window.scrollTo(0,0); }

function exportProgress(){
  const out = { exported_at:new Date().toISOString(), course:"AURORA Academy — Video Ads (Flow & Kling)", stages:[] };
  STAGES.forEach((s,i)=>{
    const o = st(i);
    out.stages.push({ etapa:i, titulo:s.title, aprobada:o.quizPassed, mejor_puntaje:Math.round(o.quizBest*100)+"%", entregable_guardado:o.delivSaved, entregable:o.deliv });
  });
  const blob = new Blob([JSON.stringify(out,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "aurora_academy_avance.json";
  a.click();
}

function resetAll(){
  if(!confirm("¿Reiniciar TODO tu avance y entregables? No se puede deshacer.")) return;
  localStorage.removeItem(LS_KEY);
  state = {stages:{}, current:0}; current = 0; save(); render(); window.scrollTo(0,0);
}

render();
</script>
</body>
</html>
